# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  - main

pool:
  name: 'default'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build Job'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: |
              npm install
              npm run build
            displayName: 'npm install and build'

  - stage: Test
    displayName: 'Test Stage'
    dependsOn: Build
    isSkippable: 'false'
    jobs:
      - job: TestJob
        displayName: 'Test Job'
        steps:
          - script: |
              echo "Running Unit Test..."
            displayName: 'Running Unit Tests'

  - stage: DeployToStaging
    displayName: 'Deploy to Staging'
    dependsOn: Test
    jobs:
      - job: DeployStagingJob
        displayName: 'Deploy To Staging Job'
        steps:
          - script: |
              echo "Build Staging Job..."
            displayName: 'Build and deploy to staging'
      - job: DeployStagingJobWithValidation
        pool: server
        timeoutInMinutes: '4320'
        displayName: 'Deploy To Staging With Validation'
        steps:
          - task: ManualValidation@1
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: harold.dev.amazon@gmail.com
              instructions: 'Please validate the stage configuration and resume'
              onTimeout: 'resume'
      - deployment: DeployWeb
        displayName: deploy Web App
        # pool:
        # vmImage: 'ubuntu-latest'
        # Creates an environment if it doesn't exist.
        # environment: 'smarthotel-dev'
        strategy:
          # Default deployment strategy, more coming...
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: echo my first deployment
